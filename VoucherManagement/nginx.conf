events {}

http {
    upstream api {
        server voucher-management-api:8080;
    }

    upstream client {
        server voucher-management-client:80;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://client/;
            proxy_set_header Host $host;
        }
    }
}